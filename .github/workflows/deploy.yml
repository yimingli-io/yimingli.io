name: Deploy to Production

# Builds the Jekyll site and deploys it to the Cloudflare Worker -> yimingli.io
on:
  push:
    branches: [master]
  workflow_dispatch: {} # allow manual re-deploys from the Actions tab

# Never run two deploys at once; a newer push cancels an in-flight one.
concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true # bundle install + cache gems

      - run: bundle exec jekyll build # emits static site to ./_site

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
